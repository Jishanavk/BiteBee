{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BiteBee{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'style.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body>
   
   <header class="navbar">

    <a href="{% url 'say_hello' %}" class="logo">
        🍕 BiteBee
    </a>
    <div class="nav-links">
    <a href="{% url 'say_hello' %}">
            Home
    </a>
    </div>
    {% if username %}

    <div class="nav-links">
        <a href="{% url 'show_cart' username %}">
            🛒 Cart
        </a>

    </div>

    <div class="nav-user">
        {{ username }}
    </div>

    {% endif %}

</header>

    <main class="main-content">

    {% block content %}
    {% endblock %}

    </main>
    <footer class="footer">
        <hr>
        <p>&copy; {% now "Y" %} BiteBee — Buzz into every bite 🐝</p>
    </footer>
</body>
</html>
