{% extends "base.html" %}
{% load static %}
{% block title %}Add Restaurant{% endblock %}

{% block extra_head %}
    <link rel="stylesheet" href="{% static 'add_restaurant.css' %}">
{% endblock %}

{% block content %}

<div class="admin-container">

    <div class="admin-card">

        <h1>Add New Restaurant</h1>

        <form action="{% url 'add_restaurant' %}" method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Restaurant Name</label>
                <input type="text" name="name" required>
            </div>

            <div class="form-group">
                <label>Picture URL</label>
                <input type="text" name="picture" required>
            </div>

            <div class="form-group">
                <label>Cuisine</label>
                <input type="text" name="cuisine" required>
            </div>

            <div class="form-group">
                <label>Rating</label>
                <input type="number" name="rating" min="0" max="5" step="0.5" required>
            </div>

            <button type="submit" class="admin-btn">
                Add Restaurant
            </button>

        </form>

    </div>

</div>

{% endblock %}
